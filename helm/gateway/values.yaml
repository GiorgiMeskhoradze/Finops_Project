replicaCount: 2

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 80

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "64Mi"
    cpu: "50m"

livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 15
readinessProbe:
  initialDelaySeconds: 3
  periodSeconds: 10
