# ---------------------------------------------------------
# 1. Base Dependencies & Java
# ---------------------------------------------------------
- name: Install Base Dependencies and Java
  ansible.builtin.apt:
    name:
      - fontconfig
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - unzip
    state: present
    update_cache: yes

# ---------------------------------------------------------
# 2. Docker Repository Setup
# ---------------------------------------------------------
- name: Download Docker GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-keyring.gpg
    creates: /usr/share/keyrings/docker-keyring.gpg

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: yes

# ---------------------------------------------------------
# 3. Install Docker
# ---------------------------------------------------------
- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: yes

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: yes


# ---------------------------------------------------------
# 3.1 Kernel tuning for SonarQube (REQUIRED)
# ---------------------------------------------------------
- name: Set vm.max_map_count for Elasticsearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes

- name: Set file descriptor limits
  ansible.builtin.blockinfile:
    path: /etc/security/limits.conf
    block: |
      * soft nofile 65536
      * hard nofile 65536

# ---------------------------------------------------------
# 4. Jenkins via Docker
# ---------------------------------------------------------
- name: Create Jenkins volume directory
  ansible.builtin.file:
    path: /var/jenkins_home
    state: directory
    mode: '0777'

- name: Run Jenkins container
  community.docker.docker_container:
    name: jenkins
    image: jenkins/jenkins:lts
    state: started
    restart_policy: always
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - /var/jenkins_home:/var/jenkins_home

# ---------------------------------------------------------
# 5. CLI Tools
# ---------------------------------------------------------
- name: Install kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ lookup('pipe', 'curl -L -s https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Download AWS CLI
  ansible.builtin.get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip

- name: Unarchive AWS CLI
  ansible.builtin.unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: yes

- name: Install AWS CLI
  ansible.builtin.command:
    cmd: /tmp/aws/install --update
    creates: /usr/local/bin/aws

- name: Download Sonar Scanner
  ansible.builtin.get_url:
    url: https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
    dest: /tmp/sonar-scanner.zip

- name: Unarchive Sonar Scanner
  ansible.builtin.unarchive:
    src: /tmp/sonar-scanner.zip
    dest: /opt/
    remote_src: yes

- name: Symlink Sonar Scanner
  ansible.builtin.file:
    src: /opt/sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner
    dest: /usr/local/bin/sonar-scanner
    state: link

# ---------------------------------------------------------
# 6. SonarQube Server (Docker)
# ---------------------------------------------------------

- name: Create SonarQube directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
  loop:
    - /opt/sonarqube/data
    - /opt/sonarqube/extensions
    - /opt/sonarqube/logs

- name: Run SonarQube container
  community.docker.docker_container:
    name: sonarqube
    image: sonarqube:lts-community
    state: started
    restart_policy: always

    ports:
      - "9000:9000"

    ulimits:
      - nofile:65536:65536

    env:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

    volumes:
      - /opt/sonarqube/data:/opt/sonarqube/data
      - /opt/sonarqube/extensions:/opt/sonarqube/extensions
      - /opt/sonarqube/logs:/opt/sonarqube/logs